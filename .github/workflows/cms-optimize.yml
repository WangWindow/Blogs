name: CMS Content Optimization

on:
  push:
    branches:
      - "cms/sveltia" # 监听固定的 CMS 分支
    paths:
      - "posts/**"
      - "uploads/**"
  workflow_dispatch:

# 并发控制：同一分支的多次推送只处理最新的（减少历史提交）
concurrency:
  group: cms-optimize
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize-and-merge:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip cms-optimize]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: cms/sveltia
          token: ${{ github.token }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Sharp
        run: bun install sharp --quiet

      - name: Run image optimization
        id: optimize
        run: |
          echo "🖼️ Starting image optimization..."
          node scripts/optimize-images.mjs

          # 检查是否有变更
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit optimized images
        if: steps.optimize.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: optimize images [skip cms-optimize]"
          git push origin HEAD:cms/sveltia

      - name: Create or update sync PR
        id: sync_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:cms/sveltia`;
            const base = "main";
            const title = "content: sync from CMS";
            const body = [
              "Automated CMS sync PR.",
              "",
              "- optimized images to WebP when possible",
              "- keeps branch history without force reset"
            ].join("\n");

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 1,
            });

            let pr;
            if (prs.length > 0) {
              pr = prs[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
              core.info(`Updated PR #${pr.number}`);
            } else {
              const { data: created } = await github.rest.pulls.create({
                owner,
                repo,
                head: "cms/sveltia",
                base,
                title,
                body,
                maintainer_can_modify: true,
              });
              pr = created;
              core.info(`Created PR #${pr.number}`);
            }

            core.setOutput("number", String(pr.number));
            core.setOutput("node_id", pr.node_id);

      - name: Auto-approve sync PR (optional)
        if: steps.sync_pr.outputs.number != '' && secrets.REPO_REVIEW_TOKEN != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_REVIEW_TOKEN }}
          script: |
            const pull_number = Number("${{ steps.sync_pr.outputs.number }}");

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                event: "APPROVE",
                body: "Auto-approved by reviewer bot.",
              });
              core.info(`Approved PR #${pull_number}`);
            } catch (error) {
              core.warning(`Unable to auto-approve PR #${pull_number}: ${error.message}`);
            }

      - name: Enable auto-merge (squash)
        if: steps.sync_pr.outputs.node_id != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const pullRequestId = "${{ steps.sync_pr.outputs.node_id }}";

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    clientMutationId
                  }
                }`,
                { pullRequestId }
              );
              core.info("Auto-merge enabled (squash).");
            } catch (error) {
              core.warning(`Unable to enable auto-merge: ${error.message}`);
            }

      - name: Summary
        run: |
          echo "## 📊 CMS 内容处理完成" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 图片已优化" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 已创建/更新 cms/sveltia -> main 的同步 PR" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 已尝试启用 Squash Auto-Merge" >> $GITHUB_STEP_SUMMARY
